    <!-- ===== ГОСТЕВАЯ КНИГА (ОБНОВЛЁННАЯ) ===== -->
<div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; width: 80%; max-width: 450px; margin: 0 auto;">
    <h3>📝 Гостевая книга</h3>
    <p style="font-size: 14px; background: none; padding: 0;">Последние 5 сообщений:</p>
    
    <div id="messages" style="margin-top: 10px; margin-bottom: 15px; text-align: left; font-size: 14px; max-height: 200px; overflow-y: auto;"></div>
    
    <input type="text" id="guestName" placeholder="Твоё имя (необязательно)" style="padding: 8px; border-radius: 20px; border: none; width: 100%; margin-bottom: 10px; box-sizing: border-box;">
    <div style="display: flex; gap: 10px;">
        <input type="text" id="messageInput" placeholder="Напиши пожелание..." style="padding: 8px; border-radius: 20px; border: none; flex: 1;">
        <button onclick="addMessage()" class="button-about" style="padding: 8px 15px;">Отправить</button>
    </div>
</div>

<script>
    // Загружаем сообщения (каждое содержит имя и текст)
    let messages = JSON.parse(localStorage.getItem('guestbook')) || [];
    
    function showMessages() {
        const container = document.getElementById('messages');
        if (messages.length === 0) {
            container.innerHTML = '<div style="color: rgba(255,255,255,0.6); text-align: center;">Пока нет сообщений. Будь первым! ✨</div>';
            return;
        }
        
        // Показываем последние 5 сообщений (в обратном порядке - новые сверху)
        let lastMessages = [...messages].reverse().slice(0, 5);
        
        container.innerHTML = lastMessages.map(msg => {
            const nameText = msg.name ? `<strong>${escapeHtml(msg.name)}</strong>` : '<strong>Аноним</strong>';
            return `<div style="background: rgba(255,255,255,0.15); padding: 8px 12px; border-radius: 15px; margin-bottom: 8px;">
                        ${nameText} · <span style="font-size: 12px; opacity: 0.7;">${msg.time}</span>
                        <div style="margin-top: 4px;">💬 ${escapeHtml(msg.text)}</div>
                    </div>`;
        }).join('');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function addMessage() {
        const nameInput = document.getElementById('guestName');
        const textInput = document.getElementById('messageInput');
        
        const name = nameInput.value.trim();
        const text = textInput.value.trim();
        
        if (text === "") {
            alert("Напиши что-нибудь!");
            return;
        }
        
        // Получаем текущее время
        const now = new Date();
        const timeStr = now.toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
        
        // Добавляем сообщение
        messages.push({
            name: name || null,
            text: text,
            time: timeStr
        });
        
        // Ограничиваем общее количество сообщений (не больше 30)
        if (messages.length > 30) {
            messages = messages.slice(-30);
        }
        
        // Сохраняем
        localStorage.setItem('guestbook', JSON.stringify(messages));
        
        // Очищаем поля
        nameInput.value = '';
        textInput.value = '';
        
        // Обновляем отображение
        showMessages();
    }
    
    // Показываем сообщения при загрузке
    showMessages();
</script>
    
    <!-- ===== КОД С СЕРДЕЧКАМИ ===== -->
    <script>
        document.body.addEventListener('click', function(event) {
            let heart = document.createElement('div');
            let hearts = ['❤️', '💖', '💕', '💗', '💓', '💞', '🌸', '✨'];
let randomHeart = hearts[Math.floor(Math.random() * hearts.length)];
heart.innerHTML = randomHeart;
            heart.style.position = 'absolute';
            heart.style.left = (event.pageX - 15) + 'px';  
            heart.style.top = (event.pageY - 15) + 'px';   
            heart.style.fontSize = '30px';
            heart.style.pointerEvents = 'none'; 
            heart.style.zIndex = '1000';
            heart.style.opacity = '1';
            heart.style.transition = 'all 0.6s ease-out';
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.style.transform = 'translateY(-100px)';
                heart.style.opacity = '0';
            }, 10);
            setTimeout(() => {
                heart.remove();
            }, 1000);
        });
    </script>

    <!-- ===== КНОПКА ТЁМНОЙ ТЕМЫ (ИСПРАВЛЕНА) ===== -->
    <button id="themeToggle" class="button-theme">🌙 Тёмная тема</button>

    <script>
        let isDark = localStorage.getItem('theme') === 'dark';
        
        function applyTheme() {
            const body = document.body;
            if (isDark) {
                body.style.background = "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)";
                document.getElementById('themeToggle').innerHTML = "☀️ Светлая тема";
            } else {
                body.style.background = "linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%)";
                document.getElementById('themeToggle').innerHTML = "🌙 Тёмная тема";
            }
        }
        
        function toggleTheme() {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme();
        }
        
        applyTheme();
        document.getElementById('themeToggle').onclick = toggleTheme;
    </script>
