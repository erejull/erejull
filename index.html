    <p>Сайт посетили: <span id="counter">0</span> раз</p>
    <script>
        let count = localStorage.getItem('visits');
        if (count === null) {
            count = 1;
        } else {
            count = Number(count) + 1;
        }
        localStorage.setItem('visits', count);
        document.getElementById('counter').innerText = count;
    </script>

        }
        updateDateTime();

    </script>

<div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; width: 80%; max-width: 400px;">
    <h3>📝 Гостевая книга</h3>
    <input type="text" id="messageInput" placeholder="Напиши что-нибудь..." style="padding: 8px; border-radius: 20px; border: none; width: 70%;">
    <button onclick="addMessage()" class="button-change" style="padding: 8px 15px;">Отправить</button>
    <div id="messages" style="margin-top: 15px; text-align: left;"></div>
</div>

<script>
    // Загружаем сообщения
    let messages = JSON.parse(localStorage.getItem('messages')) || [];
    
    function showMessages() {
        const container = document.getElementById('messages');
        container.innerHTML = messages.map(msg => `💬 ${msg}`).join('<br>');
    }
    
    function addMessage() {
        const input = document.getElementById('messageInput');
        if (input.value.trim()) {
            messages.unshift(input.value.trim());
            if (messages.length > 10) messages.pop();
            localStorage.setItem('messages', JSON.stringify(messages));
            showMessages();
            input.value = '';
        }
    }
    
    showMessages();
</script>
    
    <!-- ===== КОД С СЕРДЕЧКАМИ ===== -->
    <script>
        document.body.addEventListener('click', function(event) {
            let heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = (event.pageX - 15) + 'px';  
            heart.style.top = (event.pageY - 15) + 'px';   
            heart.style.fontSize = '30px';
            heart.style.pointerEvents = 'none'; 
            heart.style.zIndex = '1000';
            heart.style.opacity = '1';
            heart.style.transition = 'all 0.6s ease-out';
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.style.transform = 'translateY(-100px)';
                heart.style.opacity = '0';
            }, 10);
            setTimeout(() => {
                heart.remove();
            }, 1000);
        });
    </script>

    <button onclick="toggleTheme()" class="button-change">🌙 Тёмная тема</button>

<script>
    function toggleTheme() {
        const body = document.body;
        if (body.style.background.includes('ffb6c1')) {
            body.style.background = "linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%)";
        } else {
            body.style.background = "linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%)";
        }
    }
</script>
